<!DOCTYPE html> 
<html lang="en"> 
<head>
    <meta charset="UTF-8"> 
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.js"></script> 
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> 
    <title>Music App</title>
</head>

<body class="bg-light">

<div id="app" class="container mt-4">

    <h1 class="text-center mb-4"> Music App</h1>

    <!-- LOGIN -->
    <div class="card p-3 mb-4">
        <h4>Login</h4>
        <button v-on:click="login" class="btn btn-warning">Login</button>
    </div>

    <!-- GET ALL -->
    <div class="card p-3 mb-4">
        <h4>Get All Music</h4>
        <button v-on:click="getAllMusic" class="btn btn-primary">Get all Music</button>

        <ul class="mt-3" v-if="musicList.length">
            <li v-for="music in musicList" :key="music.id">
                {{music.id}} - {{music.title}} ({{music.artist}})
            </li>
        </ul>
        <div v-else class="text-muted">No Music found.</div>
    </div>

    <!-- SEARCH -->
    <div class="card p-3 mb-4">
        <h4>Search Music</h4>
        <div class="form-inline">
            <input v-model="TitleToSearch" class="form-control mr-2" placeholder="Title">
            <input v-model="artistToSearch" class="form-control mr-2" placeholder="Artist">
            <button v-on:click="searchMusic" class="btn btn-primary">Search</button>
        </div>
    </div>

    <!-- GET BY ID -->
    <div class="card p-3 mb-4">
        <h4>Get by ID</h4>
        <div class="form-inline">
            <input v-model="idToGet" class="form-control mr-2" placeholder="ID">
            <button v-on:click="getById" class="btn btn-primary">Get</button>
        </div>

        <div class="mt-2" v-if="singleMusic">
            {{ singleMusic.title }} - {{ singleMusic.artist }}
        </div>
    </div>

    <!-- ADD -->
    <div class="card p-3 mb-4">
        <h4>Add Music</h4>
        <div class="form-row">
            <input v-model="addData.title" class="form-control col mr-2" placeholder="Title">
            <input v-model="addData.artist" class="form-control col mr-2" placeholder="Artist">
            <input v-model="addData.duration" class="form-control col mr-2" placeholder="Duration">
            <input v-model="addData.publicationYear" class="form-control col mr-2" placeholder="Year">
            <button v-on:click="addMusic" class="btn btn-warning">Add</button>
        </div>
    </div>

    <!-- DELETE -->
    <div class="card p-3 mb-4">
        <h4>Delete Music</h4>
        <div class="form-inline">
            <input v-model="deleteId" class="form-control mr-2" placeholder="ID">
            <button v-on:click="deleteMusic(deleteId)" class="btn btn-danger">Delete</button>
        </div>
    </div>

    <!-- UPDATE -->
    <div class="card p-3 mb-4">
        <h4>Update Music</h4>
        <div class="form-row">
            <input v-model="updateData.id" class="form-control col mr-2" placeholder="ID">
            <input v-model="updateData.title" class="form-control col mr-2" placeholder="Title">
            <input v-model="updateData.artist" class="form-control col mr-2" placeholder="Artist">
            <input v-model="updateData.duration" class="form-control col mr-2" placeholder="Duration">
            <input v-model="updateData.publicationYear" class="form-control col mr-2" placeholder="Year">
            <button v-on:click="updateMusic" class="btn btn-warning">Update</button>
        </div>
    </div>

</div>

</body>
    <script src="Exercise.js"></script>
</body>
</html>
